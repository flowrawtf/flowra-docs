<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 310" font-family="'Halyard Display','Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ahf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1F2E73"/>
    </marker>
    <marker id="ahfm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8A8478"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="308" rx="16" fill="#F2EEE9" stroke="#E2DBCE" stroke-width="1.5"/>

  <!-- top row -->
  <rect x="44" y="60" width="160" height="58" rx="10" fill="#FBF9F5" stroke="#1F2E73" stroke-width="1.6"/>
  <text x="124" y="85" text-anchor="middle" font-size="13.5" font-weight="650" fill="#1F2E73">Orderflow stream</text>
  <text x="124" y="103" text-anchor="middle" font-size="10.5" fill="#6B675C">Block Engine</text>

  <rect x="286" y="60" width="160" height="58" rx="10" fill="#F1561B"/>
  <text x="366" y="85" text-anchor="middle" font-size="13.5" font-weight="650" fill="#F2EEE9">Your searcher</text>
  <text x="366" y="103" text-anchor="middle" font-size="10.5" fill="#FBD9C9">keypair + strategy</text>

  <rect x="528" y="60" width="160" height="58" rx="10" fill="#FBF9F5" stroke="#1F2E73" stroke-width="1.6"/>
  <text x="608" y="85" text-anchor="middle" font-size="13.5" font-weight="650" fill="#1F2E73">Bundle submission</text>
  <text x="608" y="103" text-anchor="middle" font-size="10.5" fill="#6B675C">Block Engine</text>

  <rect x="770" y="60" width="160" height="58" rx="10" fill="#FBF9F5" stroke="#1F2E73" stroke-width="1.6"/>
  <text x="850" y="85" text-anchor="middle" font-size="13.5" font-weight="650" fill="#1F2E73">Auction</text>
  <text x="850" y="103" text-anchor="middle" font-size="10.5" fill="#6B675C">every 50 ms</text>

  <!-- top arrows -->
  <line x1="204" y1="89" x2="279" y2="89" stroke="#1F2E73" stroke-width="2" marker-end="url(#ahf)"/>
  <text x="242" y="48" text-anchor="middle" font-size="10" fill="#6B675C">subscribe + filters</text>
  <line x1="446" y1="89" x2="521" y2="89" stroke="#1F2E73" stroke-width="2" marker-end="url(#ahf)"/>
  <text x="484" y="48" text-anchor="middle" font-size="10" fill="#6B675C">signed bundles</text>
  <line x1="688" y1="89" x2="763" y2="89" stroke="#1F2E73" stroke-width="2" marker-end="url(#ahf)"/>

  <!-- outcomes -->
  <path d="M820 118 L820 150 Q820 158 812 158 L678 158 Q670 158 670 166 L670 193" fill="none" stroke="#1F2E73" stroke-width="2" marker-end="url(#ahf)"/>
  <text x="745" y="150" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1F2E73">WIN</text>

  <path d="M876 118 L876 193" fill="none" stroke="#8A8478" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahfm)"/>
  <text x="886" y="158" font-size="10.5" font-weight="700" fill="#8A8478">LOSE</text>

  <rect x="590" y="200" width="160" height="58" rx="10" fill="#1F2E73"/>
  <text x="670" y="225" text-anchor="middle" font-size="13" font-weight="650" fill="#F2EEE9">Landed</text>
  <text x="670" y="243" text-anchor="middle" font-size="10.5" fill="#B9C0DE">atomic, first in block</text>

  <rect x="801" y="200" width="150" height="58" rx="10" fill="#FBF9F5" stroke="#8A8478" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="876" y="225" text-anchor="middle" font-size="13" font-weight="650" fill="#6B675C">Dropped</text>
  <text x="876" y="243" text-anchor="middle" font-size="10.5" fill="#8A8478">nothing lands or paid</text>

  <text x="44" y="284" font-size="11" fill="#6B675C">Losing an auction costs nothing: bundles are all-or-nothing, and a new 50 ms round starts immediately.</text>
</svg>
