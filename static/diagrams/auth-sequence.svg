<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" font-family="'Halyard Display','Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ahq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1F2E73"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="348" rx="16" fill="#F2EEE9" stroke="#E2DBCE" stroke-width="1.5"/>

  <!-- lifelines -->
  <g stroke="#C9C2B2" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="250" y1="78" x2="250" y2="330"/>
    <line x1="710" y1="78" x2="710" y2="330"/>
  </g>

  <!-- headers -->
  <rect x="160" y="28" width="180" height="46" rx="10" fill="#FBF9F5" stroke="#F1561B" stroke-width="1.6"/>
  <text x="250" y="48" text-anchor="middle" font-size="13" font-weight="650" fill="#F1561B">Searcher</text>
  <text x="250" y="65" text-anchor="middle" font-size="10" fill="#6B675C">Ed25519 keypair</text>

  <rect x="620" y="28" width="180" height="46" rx="10" fill="#FBF9F5" stroke="#1F2E73" stroke-width="1.6"/>
  <text x="710" y="48" text-anchor="middle" font-size="13" font-weight="650" fill="#1F2E73">Auth Service</text>
  <text x="710" y="65" text-anchor="middle" font-size="10" fill="#6B675C">Block Engine</text>

  <!-- messages -->
  <line x1="250" y1="118" x2="703" y2="118" stroke="#1F2E73" stroke-width="1.8" marker-end="url(#ahq)"/>
  <text x="480" y="108" text-anchor="middle" font-size="11" fill="#6B675C">GetChallenge (role = SEARCHER, pubkey)</text>

  <line x1="710" y1="162" x2="257" y2="162" stroke="#1F2E73" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ahq)"/>
  <text x="480" y="152" text-anchor="middle" font-size="11" fill="#6B675C">challenge string</text>

  <!-- local signing note -->
  <rect x="140" y="186" width="220" height="48" rx="8" fill="#FDEBE0" stroke="#F1561B" stroke-width="1.2"/>
  <text x="250" y="206" text-anchor="middle" font-size="10.5" font-weight="600" fill="#05161B">sign locally, key never leaves</text>
  <text x="250" y="223" text-anchor="middle" font-size="10.5" font-family="ui-monospace,monospace" fill="#6B675C">"{pubkey}-{challenge}"</text>

  <line x1="250" y1="272" x2="703" y2="272" stroke="#1F2E73" stroke-width="1.8" marker-end="url(#ahq)"/>
  <text x="480" y="262" text-anchor="middle" font-size="11" fill="#6B675C">GetTokens (signed challenge)</text>

  <line x1="710" y1="316" x2="257" y2="316" stroke="#1F2E73" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ahq)"/>
  <text x="480" y="306" text-anchor="middle" font-size="11" fill="#6B675C">access token (short-lived) + refresh token</text>
</svg>
